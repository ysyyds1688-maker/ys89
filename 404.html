<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>YS89 Registration Tutorial</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects all 404 paths back to index.html for client-side routing
      var pathSegmentsToKeep = 1; // Keep '/ys89/' prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
      );
    </script>
  </head>
  <body>
  </body>
</html>
